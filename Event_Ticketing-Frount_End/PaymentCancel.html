<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment Cancelled — EventHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--purple:#7C3AED;--grad:linear-gradient(90deg,#7C3AED,#C026D3,#EC4899);--font:'Manrope',sans-serif}
        body{font-family:var(--font);background:#F8F8FC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#fff;border-radius:24px;padding:48px 40px;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
        .icon{width:88px;height:88px;border-radius:50%;background:rgba(239,68,68,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.8rem}
        h1{font-size:1.8rem;font-weight:900;color:#111827;letter-spacing:-1px;margin-bottom:10px}
        .sub{font-size:0.95rem;color:#6B7280;line-height:1.7;margin-bottom:32px}
        .notice{background:#FEF2F2;border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:14px 18px;font-size:0.83rem;color:#EF4444;margin-bottom:28px;text-align:left}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-family:var(--font);font-size:0.9rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;border:none}
        .btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
        .btn-primary:hover{opacity:0.9}
        .btn-ghost{background:transparent;border:1.5px solid rgba(0,0,0,0.1);color:#6B7280;margin-left:10px}
        .btn-ghost:hover{border-color:var(--purple);color:var(--purple)}
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h1>Payment Cancelled</h1>
    <p class="sub">Your payment was not completed. Don't worry — your seat selection is still saved and no charge was made.</p>
    <div class="notice">
        ⚠️ Your seats are currently held as <strong>Pending</strong>. Complete payment to confirm your booking before someone else books them.
    </div>
    <div>
        <a href="javascript:history.back()" class="btn btn-primary">↩ Try Again</a>
        <a href="index.html" class="btn btn-ghost">🏠 Home</a>
    </div>
</div>
</body>
</html>
